<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web To APK Builder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Web To APK Builder</h1>

<div class="card">
<label>Nama Aplikasi</label>
<input type="text" placeholder="Contoh: MyApp">

<label>Package Name</label>
<input type="text" placeholder="com.example.myapp">

<label>Website URL</label>
<input type="text" placeholder="https://example.com">
</div>

<div class="card">
<h2>Izin Aplikasi</h2>

<label><input type="checkbox"> Kamera</label>
<label><input type="checkbox"> Mikrofon</label>
<label><input type="checkbox"> Lokasi</label>
<label><input type="checkbox"> Penyimpanan</label>
<label><input type="checkbox"> Download File</label>
<label><input type="checkbox"> Cookies</label>
</div>

<div class="card">
<h2>Upload Icon</h2>
<input type="file" accept="image/*">
</div>

<div class="card">
<button>Generate Project</button>
</div>

<div class="card">
<h2>Perintah Termux</h2>
<pre>
pkg update -y
pkg install nodejs openjdk-17 git unzip -y
npm install -g cordova

bash build.sh
</pre>
</div>

</div>

</body>
</html>
